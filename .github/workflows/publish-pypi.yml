name: Publish PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: Type "publish" to build distributions and upload them to PyPI.
        required: true
        type: string

jobs:
  build_wheels:
    if: github.event_name == 'release' || inputs.confirm_publish == 'publish'
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an Intel runner; macos-14 is Apple Silicon.
        # Do not include macos-latest here because it can duplicate arm64 wheel
        # filenames and race/overwrite files when artifacts are merged before upload.
        os:
          [
            ubuntu-latest,
            windows-latest,
            macos-15-intel,
            macos-14,
          ]
    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
      CIBW_SKIP: "pp* cp36-* *-musllinux_* *win32 *_i686 *_s390x"

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    if: github.event_name == 'release' || inputs.confirm_publish == 'publish'
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist
        run: uv run --with build python -m build --sdist

      - name: Test install
        run: uv pip install --system dist/viprs*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  upload_pypi:
    if: github.event_name == 'release' || inputs.confirm_publish == 'publish'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          # To test: repository-url: https://test.pypi.org/legacy/
